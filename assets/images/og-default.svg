<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1B33"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#F97316" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative connected nodes (top-right) -->
  <g opacity="0.12">
    <circle cx="950" cy="80" r="5" fill="#F97316"/>
    <circle cx="1000" cy="80" r="5" fill="#F97316" opacity="0.4"/>
    <circle cx="1050" cy="80" r="5" fill="#F97316"/>
    <circle cx="975" cy="130" r="5" fill="#F97316"/>
    <circle cx="1025" cy="130" r="5" fill="#F97316" opacity="0.4"/>
    <line x1="950" y1="80" x2="975" y2="130" stroke="#F97316" stroke-width="1" opacity="0.5"/>
    <line x1="1000" y1="80" x2="975" y2="130" stroke="#F97316" stroke-width="1" opacity="0.5"/>
    <line x1="1050" y1="80" x2="1025" y2="130" stroke="#F97316" stroke-width="1" opacity="0.5"/>
    <line x1="975" y1="130" x2="1025" y2="130" stroke="#F97316" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Decorative connected nodes (bottom-left) -->
  <g opacity="0.08">
    <circle cx="100" cy="480" r="6" fill="#F97316"/>
    <circle cx="160" cy="480" r="6" fill="#F97316" opacity="0.4"/>
    <circle cx="130" cy="540" r="6" fill="#F97316"/>
    <line x1="100" y1="480" x2="130" y2="540" stroke="#F97316" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="480" x2="130" y2="540" stroke="#F97316" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="480" x2="160" y2="480" stroke="#F97316" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Logo icon (house with data nodes) -->
  <g transform="translate(80, 170)">
    <rect width="72" height="72" rx="16" fill="#F97316"/>
    <path d="M36 10 L62 30 L62 62 L10 62 L10 30 Z" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="22" cy="44" r="4" fill="white"/>
    <circle cx="50" cy="44" r="4" fill="white"/>
    <circle cx="36" cy="56" r="4" fill="white"/>
    <line x1="22" y1="44" x2="50" y2="44" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="22" y1="44" x2="36" y2="56" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="50" y1="44" x2="36" y2="56" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Brand name -->
  <text x="168" y="227" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="700" font-size="52" fill="white" letter-spacing="-1">TradeBridge</text>

  <!-- Tagline -->
  <text x="82" y="295" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#94A3B8">Home Services Contractor Intelligence</text>

  <!-- Divider -->
  <rect x="82" y="325" width="60" height="3" rx="1.5" fill="#F97316"/>

  <!-- Value prop -->
  <text x="82" y="375" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#CBD5E1">Verified contractor contacts, license data, and trade</text>
  <text x="82" y="407" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#CBD5E1">segmentation for teams selling to the trades.</text>

  <!-- URL -->
  <text x="82" y="560" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#F97316">gettradebridge.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="#F97316"/>
</svg>
